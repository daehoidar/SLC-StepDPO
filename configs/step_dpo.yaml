# Step-DPO лӘЁл“ң м„Өм • (configs/default.yamlмқҳ toggleл§Ң ліҖкІҪн•ң preset).
# Step-DPO н•өмӢ¬: step-level maskingмқҖ мјңкі , belief conditioning + Type-2лҠ” лҒ”.
# вҶ’ мҲңмҲҳ Lai et al. Step-DPOмҷҖ лҸҷл“ұн•ң н•ҷмҠө.
#
# Full Step-DPO лӘЁл“ңлҠ” configs/default.yaml мӮ¬мҡ© (default).

# -------- SFT (Stage 2) --------
sft:
  use_lora: true
  lora_r: 16
  lora_alpha: 32
  lora_targets: ["q_proj", "v_proj", "o_proj", "k_proj"]
  epochs: 2
  batch_size: 4
  grad_accum: 4
  max_len: 1024
  lr: 2.0e-5
  warmup_steps: 100

# -------- Step-DPO (Stage 4) --------
use_lora: true
lora_r: 32
lora_alpha: 64
lora_targets: ["q_proj", "v_proj", "o_proj", "k_proj"]

epochs: 2
batch_size: 4
grad_accum: 8
max_len: 1024
lr: 5.0e-6
weight_decay: 0.01
warmup_steps: 100
max_grad_norm: 1.0

beta: 0.1

# -------- Step-DPO лӘЁл“ң toggle --------
disable_step_mask: false      # step-level masking мј¬ (Step-DPO н•өмӢ¬ нҠёлҰӯ)
disable_belief_token: true    # вҶҗ нҺҳлҘҙмҶҢлӮҳ нҶ нҒ° м ңкұ° (Step-DPO лӘЁл“ң н•өмӢ¬)
disable_type2: true           # вҶҗ Type-2 belief-flip pair м ңмҷё (Step-DPO лӘЁл“ң н•өмӢ¬)
